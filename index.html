<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>你的 ADHD 脑靠什么偷偷续命？</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7efe3;
      --bg2: #efe5d6;
      --bg3: #e4d5c2;
      --card: rgba(255,255,255,0.76);
      --card-strong: rgba(255,255,255,0.9);
      --line: rgba(113,86,60,0.12);
      --line-strong: rgba(113,86,60,0.18);
      --text: #3c2f26;
      --muted: #7b6655;
      --soft: #9d826b;
      --accent: #c89a63;
      --accent2: #a97c60;
      --accent3: #7f8eb7;
      --good: #6ea77e;
      --shadow: 0 18px 44px rgba(103,79,58,.12);
      --radius: 24px;
      --radius-sm: 18px;
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-right: max(env(safe-area-inset-right), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
      --safe-left: max(env(safe-area-inset-left), 0px);
    }
    body.dark {
      color-scheme: dark;
      --bg: #0d0b12;
      --bg2: #17131f;
      --bg3: #231b30;
      --card: rgba(255,255,255,0.075);
      --card-strong: rgba(255,255,255,0.1);
      --line: rgba(255,255,255,0.12);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f7f2ea;
      --muted: #cabdd0;
      --soft: #b29fb9;
      --accent: #e7c48b;
      --accent2: #a98bd8;
      --accent3: #6a7fff;
      --good: #9fd3aa;
      --shadow: 0 18px 50px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Noto Sans CJK SC", "PingFang SC", "Hiragino Sans GB", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(201,154,99,.11), transparent 30%),
        radial-gradient(circle at top right, rgba(169,124,96,.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 68%, var(--bg3) 100%);
      overscroll-behavior-y: contain;
      transition: background .25s ease, color .25s ease;
    }
    body.dark {
      background:
        radial-gradient(circle at top left, rgba(169,139,216,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(231,196,139,.12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 65%, #0f0c15 100%);
    }
    img { max-width: 100%; display: block; }
    button, input, textarea, select { font: inherit; }
    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        calc(28px + var(--safe-bottom))
        calc(14px + var(--safe-left));
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand {
      justify-self: center;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .02em;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(8px);
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      box-shadow: var(--shadow);
    }
    .icon-btn:hover { transform: scale(1.05); }
    .icon-btn:active { transform: scale(0.95); }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      margin-bottom: 20px;
    }
    .hero {
      text-align: center;
      padding: 48px 20px;
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 16px 0;
      line-height: 1.3;
    }
    .hero p {
      font-size: 16px;
      color: var(--muted);
      margin: 0 0 32px 0;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 8px 24px rgba(200,154,99,.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(200,154,99,.4); }
    .btn:active { transform: translateY(0); }
    .question-card {
      margin-bottom: 24px;
    }
    .question-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .option {
      padding: 16px 20px;
      margin-bottom: 12px;
      background: var(--card-strong);
      border: 2px solid var(--line);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all .2s;
      font-size: 15px;
      line-height: 1.6;
    }
    .option:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .option.selected {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }
    .progress-bar {
      height: 6px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .3s ease;
    }
    .result-card {
      text-align: center;
    }
    .result-type {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .result-rarity {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .result-content {
      text-align: left;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 24px;
    }
    .result-content p {
      margin-bottom: 16px;
    }
    .result-hero {
      width: 100%;
      max-width: 640px;
      margin: 0 auto 24px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      background: var(--card-strong);
    }
    .result-hero img {
      width: 100%;
      height: auto;
      display: block;
    }
    .paywall {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: white;
      padding: 32px;
      border-radius: var(--radius);
      text-align: center;
      margin-top: 24px;
    }
    .paywall h3 {
      font-size: 22px;
      margin: 0 0 12px 0;
    }
    .paywall p {
      margin: 0 0 24px 0;
      opacity: 0.9;
    }
    .paywall .btn {
      background: white;
      color: var(--accent);
    }
    .paid-content {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--line);
    }
    .song-quote {
      background: var(--card-strong);
      padding: 24px;
      border-radius: var(--radius-sm);
      border-left: 4px solid var(--accent);
      margin: 24px 0;
      font-style: italic;
    }
    .song-quote .lyrics {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 8px;
      color: var(--text);
    }
    .song-quote .artist {

      color: var(--muted);
      margin-bottom: 8px;
    }
    .song-quote .note {
      font-size: 14px;
      color: var(--soft);
    }
    .cp-section {
      background: var(--card-strong);
      padding: 24px;
      border-radius: var(--radius-sm);
      margin: 24px 0;
    }
    .cp-section h4 {
      margin: 0 0 16px 0;
      font-size: 18px;
    }
    .cp-item {
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .cp-item strong {
      color: var(--accent);
    }
    .tools-section {
      margin-top: 24px;
    }

      margin: 0 0 16px 0;
      font-size: 18px;
    }

      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      border-left: 3px solid var(--good);
      line-height: 1.6;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">

你不是懒，也不是不负责任。你只是你的大脑需要那个“紧急”的信号，才能把引擎发动起来。

    const usedCodes = JSON.parse(localStorage.getItem('usedCodes') || '[]');
    const myCode = localStorage.getItem('myCode');
    if (usedCodes.indexOf(code) !== -1 && myCode !== code) {
      errorEl.textContent = '该卡密已被其他设备使用，如有疑问请私信客服';
      return;
    }
    if (usedCodes.indexOf(code) === -1) {
      usedCodes.push(code);
      localStorage.setItem('usedCodes', JSON.stringify(usedCodes));
    }
    localStorage.setItem('myCode', code);
    localStorage.setItem('isUnlocked', 'true');
    isUnlocked = true;
  }

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('testPage').classList.remove('hidden');
  currentQuestion = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  viewingReturnedQuestion = false;
  scores = { deadline: 0, novelty: 0, witness: 0, chaos: 0, hyperfocus: 0, drift: 0 };
  showQuestion();
});

// 返回首页按钮
document.getElementById('restartBtn').addEventListener('click', function() {
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  window.scrollTo(0, 0);
});

function updateProgress() {
  const progress = ((currentQuestion + 1) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
}

function calculateScoresFromAnswers() {
  scores = { deadline: 0, novelty: 0, witness: 0, chaos: 0, hyperfocus: 0, drift: 0 };
  answers.forEach(function(answerIndex, questionIndex) {
    if (answerIndex === null) return;
    const selected = QUESTIONS[questionIndex].options[answerIndex];
    for (let type in selected.scores) {
      scores[type] += selected.scores[type];
    }
  });
}

function showQuestion() {
  const q = QUESTIONS[currentQuestion];
  const container = document.getElementById('questionContainer');
  const savedAnswer = answers[currentQuestion];

  let html = '<div class="question-card"><div class="question-title">' + (currentQuestion + 1) + '. ' + q.q + '</div>';
  q.options.forEach(function(opt, i) {
    html += '<div class="option' + (savedAnswer === i ? ' selected' : '') + '" data-index="' + i + '">' + opt.text + '</div>';
  });
  html += '</div>';
  container.innerHTML = html;

  const options = container.querySelectorAll('.option');
  options.forEach(function(opt) {
    opt.addEventListener('click', function() {
      const selectedOption = parseInt(this.getAttribute('data-index'));
      answers[currentQuestion] = selectedOption;
      options.forEach(function(o) { o.classList.remove('selected'); });
      this.classList.add('selected');

      setTimeout(function() {
        if (currentQuestion < QUESTIONS.length - 1) {
          currentQuestion++;
          viewingReturnedQuestion = false;
          showQuestion();
        } else {
          calculateScoresFromAnswers();
          showResult();
        }
      }, 140);
    });
  });

  const backBtn = document.getElementById('backBtn');
  const canGoBack = currentQuestion > 0 && !viewingReturnedQuestion;
  backBtn.style.display = canGoBack ? 'block' : 'none';
  updateProgress();
}

document.getElementById('backBtn').addEventListener('click', function() {
  if (currentQuestion > 0 && !viewingReturnedQuestion) {
    currentQuestion -= 1;
    viewingReturnedQuestion = true;
    showQuestion();
  }
});

function showResult() {
  let maxScore = -1;
  let resultType = 'deadline';
  for (let type in scores) {
    if (scores[type] > maxScore) {
      maxScore = scores[type];
      resultType = type;
    }
  }

  currentResultType = resultType;
  const result = RESULTS[resultType];
  const fullData = FULL_CONTENT[resultType];

  document.getElementById('testPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');

  // 称呼
  const greetEl = document.getElementById('resultGreeting');
  if (userNickname) {
    greetEl.textContent = '亲爱的 ' + userNickname + ' ——';
  } else {
    greetEl.textContent = '';
  }

  document.getElementById('resultType').textContent = result.name;
  document.getElementById('resultRarity').textContent = '稀有度: ' + result.rarity + ' 的人和你一样';
  document.getElementById('resultHeroImage').src = RESULT_IMAGES[resultType];

  // 主文案：解锁就显示完整版，未解锁显示 preview
  const textSource = isUnlocked ? fullData.full : result.preview;
  const paragraphs = textSource.split('\n\n');
  let content = '';
  paragraphs.forEach(function(p) {
    content += '<p>' + p + '</p>';
  });
  content += '<p style="color: var(--accent); font-weight: 600; margin-top: 24px;">' + result.tip + '</p>';
  document.getElementById('resultContent').innerHTML = content;

  if (isUnlocked) {
    // 显示付费内容
    let songHTML = '<div class="lyrics">"' + fullData.song + '"</div>';
    songHTML += '<div class="artist">—— ' + fullData.songArtist + '</div>';
    songHTML += '<div class="note">' + fullData.songNote + '</div>';
    document.getElementById('songQuote').innerHTML = songHTML;

    let cpHTML = '<h4>谁最懂你 / 谁容易误解你</h4>';
    cpHTML += '<div class="cp-item"><strong>最懂你的：</strong>' + fullData.bestMatch + '</div>';
    cpHTML += '<div class="cp-item"><strong>容易误解你的：</strong>' + fullData.hardMatch + '</div>';
    cpHTML += '<div class="cp-item" style="margin-top: 16px; font-style: italic;">' + fullData.cpNote + '</div>';
    document.getElementById('cpSection').innerHTML = cpHTML;

    let toolsHTML = '<h4>续命工具包</h4>';
    fullData.tools.forEach(function(tool) {
      toolsHTML += '<div class="tool-item">' + tool + '</div>';
    });
    document.getElementById('toolsSection').innerHTML = toolsHTML;

    document.getElementById('paidContent').classList.remove('hidden');
    document.getElementById('lockedHint').classList.add('hidden');
  } else {
    document.getElementById('paidContent').classList.add('hidden');
    document.getElementById('lockedHint').classList.remove('hidden');
  }
}

  </script>
</body>
</html>
